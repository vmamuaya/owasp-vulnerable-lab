# nginx config for native vulnerable apps lab
# Each app runs on its own port, nginx proxies them through port 80
# Uses direct IP:port in proxy_pass (NOT upstream names — those cause "host not found" errors)

server {
    listen 80;
    server_name _;
    
    # Dashboard
    location / {
        root /home/USER/vulnapps/dashboard;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Juice Shop (port 3000)
    location /juice-shop/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # DVGA (port 5013)
    location /dvga/ {
        proxy_pass http://127.0.0.1:5013/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebGoat (port 8080)
    location /WebGoat/ {
        proxy_pass http://127.0.0.1:8080/WebGoat/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # WebWolf (part of WebGoat, port 9090)
    location /WebWolf/ {
        proxy_pass http://127.0.0.1:9090/WebWolf/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # VulnerableApp (port 9091)
    location /VulnerableApp/ {
        proxy_pass http://127.0.0.1:9091/VulnerableApp/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # crAPI Gateway (port 8888, HTTPS with self-signed cert)
    location /crapi/ {
        proxy_pass https://127.0.0.1:8888/;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Mutillidae (port 8081, PHP via FPM)
    location /mutillidae/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WackoPicko (port 8082, PHP via FPM)
    location /wackopicko/ {
        proxy_pass http://127.0.0.1:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Mutillidae on port 8081 (PHP via FPM — index.php is in src/ subdir)
server {
    listen 8081;
    server_name _;
    root /home/USER/vulnapps/mutillidae/src;
    index index.php index.html;
    
    location / {
        try_files $uri $uri/ /index.php?$args;
    }
    
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}

# WackoPicko on port 8082 (PHP via FPM with mysql_compat shim auto-prepended)
# WackoPicko is a PHP 5.x app — uses php5.6-fpm.sock (NOT php8.1)
server {
    listen 8082;
    server_name _;
    root /home/USER/vulnapps/wackopicko/website;
    index index.php index.html;
    
    location ~ \\.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php5.6-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "auto_prepend_file=/home/USER/vulnapps/wackopicko/mysql_compat.php";
    }
    
    location / {
        try_files $uri $uri/ /index.php?$args;
    }
}